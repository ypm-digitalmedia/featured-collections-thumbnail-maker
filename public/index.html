<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YPM Featured Collections Thumbnail Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="apple-touch-icon" href="/img/touch-icon-228.png">
</head>
<body>
    <header>
        <h1>YPM Featured Collections Thumbnail Maker</h1>
        <div class="input-group">
            <input id="input-guid" type="text" placeholder="Enter image UUID or full IIIF URL" value="896df44c-3130-47bc-8a8c-e8c0b539b0ea" class="form-control">
            <button id="load-image" class="btn btn-primary">
                Load Image
            </button>
        </div>
    </header>

    <main id="app">
        <div id="loader" class="loader">
            <img src="/img/ripples.svg" alt="Loading...">
        </div>
        <img id="canvas" src="" alt="Image to crop" style="display: none;">
    </main>

    <footer>
        <div class="input-group">
            <input type="text" id="output-url" placeholder="Output image URL" class="form-control">
            <button id="preview-image" class="btn btn-primary">
                Get Thumbnail
            </button>
        </div>
    </footer>

    <div id="debug">
        <pre id="debug-info">Debug Info will appear here</pre>
        <button id="recenter-btn" class="btn btn-sm btn-secondary">Recenter Image</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.js"></script>
    <script src="bundle.js"></script>
</body>
</html>
